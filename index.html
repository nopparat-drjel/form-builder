<style>
:root{--bg:#f5f5f5;--sd:#cecece;--sl:#ffffff;--g1:#1a4d24;--g2:#2d7a3a;--g3:#48b356;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Prompt',sans-serif;color:#2d3748;}
input,textarea,select{font-family:'Sarabun',sans-serif!important;color:#374151;}
.neu{background:var(--bg);border-radius:16px;box-shadow:6px 6px 14px var(--sd),-6px -6px 14px var(--sl);}
.neu-sm{background:var(--bg);border-radius:12px;box-shadow:4px 4px 9px var(--sd),-4px -4px 9px var(--sl);}
.neu-xs{background:var(--bg);border-radius:8px;box-shadow:3px 3px 6px var(--sd),-3px -3px 6px var(--sl);}
.neu-in{background:var(--bg);border-radius:10px;box-shadow:inset 3px 3px 7px var(--sd),inset -3px -3px 7px var(--sl);}
.neu-in-sm{background:var(--bg);border-radius:8px;box-shadow:inset 2px 2px 5px var(--sd),inset -2px -2px 5px var(--sl);}
.ni{background:var(--bg);border-radius:10px;box-shadow:inset 2px 2px 5px var(--sd),inset -2px -2px 5px var(--sl);border:none;outline:none;width:100%;padding:9px 13px;font-size:13px;transition:box-shadow .2s;}
.ni:focus{box-shadow:inset 2px 2px 5px var(--sd),inset -2px -2px 5px var(--sl),0 0 0 2px rgba(45,122,58,.25);}
.nb{background:linear-gradient(145deg,#fafafa,#ebebeb);border-radius:10px;box-shadow:3px 3px 7px var(--sd),-3px -3px 7px var(--sl);border:none;cursor:pointer;font-family:'Prompt',sans-serif;transition:all .15s;}
.nb:hover{box-shadow:4px 4px 10px var(--sd),-4px -4px 10px var(--sl);}
.nb:active{box-shadow:inset 2px 2px 5px var(--sd),inset -2px -2px 5px var(--sl);}
.nbg{background:linear-gradient(135deg,var(--g1),var(--g3));border-radius:12px;box-shadow:4px 4px 10px rgba(45,122,58,.4),-2px -2px 6px rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;font-family:'Prompt',sans-serif;font-weight:600;transition:all .15s;}
.nbg:hover{box-shadow:5px 5px 13px rgba(45,122,58,.5);transform:translateY(-1px);}
.nbg:active{box-shadow:inset 2px 2px 6px rgba(0,0,0,.2);transform:translateY(0);}
.nbd{background:linear-gradient(135deg,#c53030,#e53e3e);border-radius:10px;box-shadow:3px 3px 7px rgba(197,48,48,.3);border:none;cursor:pointer;color:#fff;font-family:'Prompt',sans-serif;transition:all .15s;}
.sb{background:linear-gradient(175deg,#142e18 0%,#1a4d24 50%,#2d7a3a 100%);}
.mi{font-family:'Material Symbols Outlined';font-weight:400;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;direction:ltr;-webkit-font-smoothing:antialiased;user-select:none;vertical-align:middle;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#c8c8c8;border-radius:3px;}
.tbl-in{background:transparent;border:none;outline:none;width:100%;padding:3px 4px;font-size:12px;font-family:'Sarabun',sans-serif;}
.tbl-in:focus{background:rgba(45,122,58,.06);border-radius:3px;}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.bfull{flex:0 0 100%;min-width:0;}
.bhalf{flex:0 0 calc(50% - 6px);min-width:0;}
.bthird{flex:0 0 calc(33.333% - 8px);min-width:0;}
.stat-bar{display:flex;border-top:2px solid rgba(45,122,58,.15);margin-top:4px;}
.stat-col{flex:1;padding:14px 16px;text-align:center;border-right:1px solid #ebebeb;}
.stat-col:last-child{border-right:none;}
.resp-row{display:flex;align-items:center;gap:12px;padding:11px 20px;border-top:1px solid #f0f0f0;cursor:pointer;transition:background .15s;}
.resp-row:hover{background:rgba(45,122,58,.04);}
@media print{.no-print{display:none!important;}body{background:white!important;}.neu,.neu-sm{box-shadow:none!important;border:1px solid #eee!important;}.pagebreak-block{page-break-after:always;}@page{size:A4;margin:15mm;}}
.mc{background:#f0f0f0;border-radius:16px;box-shadow:0 28px 72px rgba(0,0,0,.45),0 8px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.7);}

      ['วัน/เดือน/ปีเกิด','15 ก.พ. 2538 (อายุ 30 ปี)'],
      ['เพศ (Sex)',isM?'ชาย (Male)':'หญิง (Female)'],
      ['สถานภาพ (Marital Status)','โสด'],

/* ── BlockSettings ── */
function BlockSettings({block,onChange,onDelete}){
  const upd=(k,v)=>onChange({...block,[k]:v});
  const updOpt=(i,v)=>{const o=[...( block.options||[])];o[i]=v;upd('options',o);};
  const addOpt=()=>upd('options',[...(block.options||[]),('ตัวเลือก '+(( block.options?.length||0)+1))]);
  const delOpt=(i)=>{const o=[...(block.options||[])];o.splice(i,1);upd('options',o);};
  const updCol=(i,v)=>{const c=[...(block.columns||[])];c[i]=v;upd('columns',c);};
  const updRow=(i,v)=>{const r=[...(block.rows||[])];r[i]=v;upd('rows',r);};
  return(
    <div style={{padding:'0 4px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{fontSize:13,fontWeight:600,color:'#374151'}}>ตั้งค่า Block</span>
        <button onClick={onDelete} className="nbd" style={{padding:'5px 10px',fontSize:11,display:'flex',alignItems:'center',gap:3}}>
          <I n="delete" s={14}/> ลบ
        </button>
      </div>
      {block.type!=='section'&&block.type!=='table'&&block.type!=='matrix'&&(
        <div style={{marginBottom:10}}>
          <SL c="Label"/>
          <NI value={block.label} onChange={v=>upd('label',v)} placeholder="ชื่อ Field"/>
        </div>
      )}
      {block.type==='section'&&(
        <div style={{marginBottom:10}}>
          <SL c="หัวข้อ"/>
          <NI value={block.label} onChange={v=>upd('label',v)} placeholder="ชื่อหัวข้อ"/>
        </div>
      )}
      {(block.type==='text'||block.type==='number'||block.type==='textarea')&&(
        <div style={{marginBottom:10}}>
          <SL c="Placeholder"/>
          <NI value={block.placeholder} onChange={v=>upd('placeholder',v)} placeholder="ข้อความตัวอย่าง"/>
        </div>
      )}
      {block.type==='text'&&(
        <div style={{marginBottom:10}}>
          <SL c="Input Type"/>
          <NS value={block.inputType||'text'} onChange={v=>upd('inputType',v)}
            opts={[{v:'text',l:'Text'},{v:'email',l:'Email'},{v:'tel',l:'Tel'},{v:'url',l:'URL'}]}/>
        </div>
      )}
      {block.type==='number'&&(
        <div style={{marginBottom:10}}>
          <SL c="หน่วย (Unit)"/>
          <NI value={block.unit} onChange={v=>upd('unit',v)} placeholder="เช่น บาท, ปี, cm"/>
        </div>
      )}
      {block.type==='textarea'&&(
        <div style={{marginBottom:10}}>
          <SL c="จำนวนบรรทัด"/>
          <NI type="number" value={block.rows??4} onChange={v=>upd('rows',+v)} placeholder="4"/>
        </div>
      )}
      {(block.type==='radio'||block.type==='checkbox')&&(
        <div style={{marginBottom:10}}>
          <SL c="ตัวเลือก"/>
          {(block.options||[]).map((o,i)=>(
            <div key={i} style={{display:'flex',gap:5,marginBottom:5}}>
              <NI value={o} onChange={v=>updOpt(i,v)} placeholder={'ตัวเลือก '+(i+1)}/>
              <button onClick={()=>delOpt(i)} className="nb" style={{padding:'0 8px',flexShrink:0}}><I n="close" s={14}/></button>
            </div>
          ))}
          <button onClick={addOpt} className="nb" style={{width:'100%',padding:'6px',fontSize:12,marginTop:2,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
            <I n="add" s={14}/>เพิ่มตัวเลือก
          </button>
        </div>
      )}
      {block.type==='radio'&&(
        <div style={{marginBottom:10}}>
          <SL c="Layout"/>
          <NS value={block.layout||'vertical'} onChange={v=>upd('layout',v)}
            opts={[{v:'vertical',l:'แนวตั้ง'},{v:'horizontal',l:'แนวนอน'}]}/>
        </div>
      )}
      {block.type==='table'&&(
        <>
          <div style={{marginBottom:10}}>
            <SL c="ชื่อตาราง"/>
            <NI value={block.label} onChange={v=>upd('label',v)} placeholder="ชื่อตาราง"/>
          </div>
          <div style={{marginBottom:10}}>
            <SL c="คอลัมน์"/>
            {(block.columns||[]).map((c,i)=>(
              <div key={i} style={{display:'flex',gap:4,marginBottom:5}}>
                <NI value={c} onChange={v=>updCol(i,v)} placeholder={'คอลัมน์ '+(i+1)}/>
                <button onClick={()=>{const a=[...(block.columns||[])];a.splice(i,1);upd('columns',a);}} className="nb" style={{padding:'0 6px',flexShrink:0}}><I n="close" s={12}/></button>
              </div>
            ))}
            <button onClick={()=>upd('columns',[...(block.columns||[]),'คอลัมน์ '+((block.columns?.length||0)+1)])} className="nb" style={{width:'100%',padding:'5px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
              <I n="add" s={12}/>เพิ่มคอลัมน์
            </button>
          </div>
          <div style={{marginBottom:10}}>
            <SL c="แถวเริ่มต้น"/>
            {(block.rows||[]).map((r,i)=>(
              <div key={i} style={{display:'flex',gap:4,marginBottom:5}}>
                <NI value={r} onChange={v=>updRow(i,v)} placeholder={'แถว '+(i+1)}/>
                <button onClick={()=>{const a=[...(block.rows||[])];a.splice(i,1);upd('rows',a);}} className="nb" style={{padding:'0 6px',flexShrink:0}}><I n="close" s={12}/></button>
              </div>
            ))}
            <button onClick={()=>upd('rows',[...(block.rows||[]),''])} className="nb" style={{width:'100%',padding:'5px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
              <I n="add" s={12}/>เพิ่มแถว
            </button>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <SL c="เพิ่มแถวได้"/>
            <Toggle v={block.canAddRows} on={v=>upd('canAddRows',v)}/>
          </div>
        </>
      )}
      {block.type==='matrix'&&(
        <>
          <div style={{marginBottom:10}}>
            <SL c="ชื่อตาราง"/>
            <NI value={block.label} onChange={v=>upd('label',v)} placeholder="ชื่อตาราง"/>
          </div>
          <div style={{marginBottom:10}}>
            <SL c="แถว (Rows)"/>
            {(block.rows||[]).map((r,ri)=>(
              <div key={ri} style={{display:'flex',gap:4,marginBottom:5}}>
                <NI value={r} onChange={v=>{const a=[...(block.rows||[])];a[ri]=v;upd('rows',a);}} placeholder={'แถว '+(ri+1)}/>
                <button onClick={()=>{const a=[...(block.rows||[])];a.splice(ri,1);upd('rows',a);}} className="nb" style={{padding:'0 6px',flexShrink:0}}><I n="close" s={12}/></button>
              </div>
            ))}
            <button onClick={()=>upd('rows',[...(block.rows||[]),'แถว '+((block.rows?.length||0)+1)])} className="nb" style={{width:'100%',padding:'5px',fontSize:11,marginTop:2,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
              <I n="add" s={12}/>เพิ่มแถว
            </button>
          </div>
          <div style={{marginBottom:4}}>
            <SL c="กลุ่ม / หัวข้อ (Groups)"/>
          </div>
          {(block.groups||[]).map((g,gi)=>(
            <div key={gi} className="neu-in-sm" style={{padding:'8px 10px',marginBottom:8}}>
              <div style={{display:'flex',gap:4,marginBottom:6,alignItems:'center'}}>
                <span style={{fontSize:10,color:'#9ca3af',flexShrink:0}}>ชื่อ:</span>
                <NI value={g.label} onChange={v=>{const gs=JSON.parse(JSON.stringify(block.groups||[]));gs[gi].label=v;upd('groups',gs);}} placeholder={'กลุ่ม '+(gi+1)}/>
                <button onClick={()=>{const gs=JSON.parse(JSON.stringify(block.groups||[]));gs.splice(gi,1);upd('groups',gs);}} className="nbd" style={{padding:'2px 5px',flexShrink:0}}><I n="close" s={12}/></button>
              </div>
              <div style={{fontSize:10,color:'#6b7280',marginBottom:4}}>ระดับ:</div>
              {(g.levels||[]).map((lv,li)=>(
                <div key={li} style={{display:'flex',gap:4,marginBottom:4}}>
                  <NI value={lv} onChange={v=>{const gs=JSON.parse(JSON.stringify(block.groups||[]));gs[gi].levels[li]=v;upd('groups',gs);}} placeholder={'ระดับ '+(li+1)}/>
                  <button onClick={()=>{const gs=JSON.parse(JSON.stringify(block.groups||[]));gs[gi].levels.splice(li,1);upd('groups',gs);}} className="nb" style={{padding:'0 5px',flexShrink:0}}><I n="close" s={11}/></button>
                </div>
              ))}
              <button onClick={()=>{const gs=JSON.parse(JSON.stringify(block.groups||[]));gs[gi].levels.push('ระดับ '+((gs[gi].levels?.length||0)+1));upd('groups',gs);}} className="nb" style={{width:'100%',padding:'4px',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
                <I n="add" s={11}/>เพิ่มระดับ
              </button>
            </div>
          ))}
          <button onClick={()=>upd('groups',[...(block.groups||[]),{label:'กลุ่ม '+((block.groups?.length||0)+1),levels:['ดี','ปานกลาง','พอใช้']}])} className="nb" style={{width:'100%',padding:'6px',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
            <I n="add" s={13}/>เพิ่มกลุ่ม
          </button>
        </>
      )}
      {block.type!=='section'&&block.type!=='pagebreak'&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <SL c="จำเป็น (Required)"/>
          <Toggle v={!!block.required} on={v=>upd('required',v)}/>
        </div>
      )}
      {block.type!=='pagebreak'&&(
      <div style={{marginBottom:10}}>
        <SL c="ขนาด (Column Span)"/>
        <NS value={block.colSpan||'full'} onChange={v=>upd('colSpan',v)}
          opts={[{v:'full',l:'เต็มแถว'},{v:'half',l:'ครึ่งแถว'},{v:'third',l:'1/3 แถว'}]}/>
      </div>
      )}
      {block.colSpan!=='full'&&(
        <>
          <div style={{marginBottom:10}}>
            <SL c="ตำแหน่งใน Row"/>
            <div style={{display:'flex',gap:4}}>
              {[{v:'start',i:'format_align_left'},{v:'center',i:'format_align_center'},{v:'end',i:'format_align_right'}].map(({v,i})=>(
                <button key={v} onClick={()=>upd('blockAlign',v)}
                  className={(block.blockAlign||'start')===v?'nbg':'nb'}
                  style={{flex:1,padding:'6px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <I n={i} s={14}/>
                </button>
              ))}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <SL c="ขึ้นแถวใหม่"/>
            <Toggle v={!!block.breakRow} on={v=>upd('breakRow',v)}/>
          </div>
        </>
      )}
    </div>
  );
}

/* ── FormSettings ── */
function FormSettings({logo,desc,onLogoChange,onDescChange}){
  const fileRef=useRef();
  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>onLogoChange({...logo,dataUrl:ev.target.result});
    reader.readAsDataURL(file);
  };
  return(
    <div style={{padding:'0 4px'}}>
      <div style={{marginBottom:14}}>
        <span style={{fontSize:13,fontWeight:600,color:'#374151'}}>ตั้งค่าฟอร์ม</span>
      </div>
      <div style={{marginBottom:12}}>
        <SL c="คำอธิบายฟอร์ม"/>
        <textarea className="ni" value={desc||''} onChange={e=>onDescChange(e.target.value)}
          placeholder="คำอธิบายหรือคำแนะนำสำหรับผู้กรอก"
          style={{height:72,resize:'vertical'}}/>
      </div>
      <div style={{marginBottom:12}}>
        <SL c="จัดชิดหัวข้อ (Title)"/>
        <div style={{display:'flex',gap:4}}>
          {[{v:'left',i:'format_align_left'},{v:'center',i:'format_align_center'},{v:'right',i:'format_align_right'}].map(({v,i})=>(
            <button key={v} onClick={()=>onLogoChange({...logo,titleAlign:v})}
              className={(logo.titleAlign||'left')===v?'nbg':'nb'}
              style={{flex:1,padding:'7px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <I n={i} s={15}/>
            </button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <SL c="โลโก้บริษัท"/>
        {logo.dataUrl?(
          <div style={{marginBottom:8,textAlign:'center'}}>
            <img src={logo.dataUrl} alt="logo" style={{maxHeight:60,maxWidth:'100%',objectFit:'contain',borderRadius:6}}/>
            <button onClick={()=>onLogoChange({...logo,dataUrl:''})} className="nb"
              style={{display:'block',margin:'6px auto 0',padding:'4px 12px',fontSize:11}}>
              ลบโลโก้
            </button>
          </div>
        ):(
          <button onClick={()=>fileRef.current.click()} className="nb"
            style={{width:'100%',padding:'10px',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <I n="upload" s={16}/>อัปโหลดโลโก้
          </button>
        )}
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
      </div>
      {logo.dataUrl&&(
        <>
          <div style={{marginBottom:10}}>
            <SL c="ตำแหน่งโลโก้ (Image)"/>
            <div style={{display:'flex',gap:4}}>
              {[{v:'left',i:'format_align_left'},{v:'center',i:'format_align_center'},{v:'right',i:'format_align_right'}].map(({v,i})=>(
                <button key={v} onClick={()=>onLogoChange({...logo,position:v})}
                  className={(logo.position||'left')===v?'nbg':'nb'}
                  style={{flex:1,padding:'7px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <I n={i} s={15}/>
                </button>
              ))}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <SL c="อยู่บรรทัดเดียวกับชื่อ"/>
            <Toggle v={!!logo.inline} on={v=>onLogoChange({...logo,inline:v})}/>
          </div>
        </>
      )}
    </div>
  );
}

/* ── NewFormDialog ── */
function NewFormDialog({onClose,onCreate}){
  const [title,setTitle]=useState('ใบสมัครงาน (ใหม่)');
  const [desc,setDesc]=useState('');
  const submit=()=>{
    if(!title.trim())return;
    const id='f'+Date.now();
    onCreate({
      id,title:title.trim(),desc:desc.trim(),active:true,
      logo:{dataUrl:'',position:'left',inline:true,titleAlign:'left'},
      blocks:JSON.parse(JSON.stringify(DEF_BLOCKS)),
      createdAt:new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}),
      updatedAt:new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'}),
      shareCount:0,lastSharedAt:null,
    });
    onClose();
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9000}}>
      <div className="mc" style={{width:420,padding:28}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <span style={{fontSize:16,fontWeight:700,color:'#1a4d24'}}>สร้างฟอร์มใหม่</span>
          <button onClick={onClose} className="nb" style={{padding:'6px'}}><I n="close" s={18}/></button>
        </div>
        <div style={{marginBottom:14}}>
          <SL c="ชื่อฟอร์ม *"/>
          <NI value={title} onChange={setTitle} placeholder="ชื่อฟอร์ม"/>
        </div>
        <div style={{marginBottom:20}}>
          <SL c="คำอธิบาย"/>
          <textarea className="ni" value={desc} onChange={e=>setDesc(e.target.value)}
            placeholder="คำอธิบายสั้นๆ ของฟอร์ม"
            style={{height:72,resize:'vertical'}}/>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="nb" style={{padding:'9px 20px',fontSize:13}}>ยกเลิก</button>
          <button onClick={submit} className="nbg" style={{padding:'9px 24px',fontSize:13}}>
            <I n="add" s={16}/> สร้างฟอร์ม
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── ResponseDetailModal ── */
function ResponseDetailModal({resp,form,onClose}){
  if(!resp)return null;
  const fields=genFields(resp);
  const statusMap={new:{l:'ใหม่',c:'#3b82f6'},reviewed:{l:'ตรวจแล้ว',c:'#f59e0b'},shortlisted:{l:'คัดเลือกแล้ว',c:'#10b981'},rejected:{l:'ปฏิเสธ',c:'#ef4444'}};
  const st=statusMap[resp.status]||statusMap.new;
  const printPDF=()=>{
    const logo=form?.logo;
    const logoHtml=logo?.dataUrl?`<img src="${logo.dataUrl}" style="height:50px;object-fit:contain;margin-bottom:${logo.inline?'0':'8px'};"/>`:'';;
    const headerHtml=logo?.dataUrl&&logo?.inline
      ?`<div style="display:flex;align-items:center;gap:16px;justify-content:${logo.position==='center'?'center':logo.position==='right'?'flex-end':'flex-start'};margin-bottom:8px;">${logoHtml}<div><h1 style="margin:0;font-size:20px;">${form?.title||'ใบสมัครงาน'}</h1><p style="margin:4px 0 0;color:#555;font-size:13px;">${form?.desc||''}</p></div></div>`
      :`<div style="text-align:${logo?.position||'left'};margin-bottom:8px;">${logoHtml}<h1 style="margin:4px 0 0;font-size:20px;">${form?.title||'ใบสมัครงาน'}</h1><p style="margin:4px 0 0;color:#555;font-size:13px;">${form?.desc||''}</p></div>`;
    const sectionsHtml=fields.map(sec=>{
      if(sec.type==='fields'){
        const rows=sec.items.map(([k,v])=>`<tr><td style="padding:5px 8px;font-weight:600;color:#374151;width:40%;border:1px solid #e5e7eb;">${k}</td><td style="padding:5px 8px;border:1px solid #e5e7eb;">${v}</td></tr>`).join('');
        return `<h3 style="margin:16px 0 6px;color:#1a4d24;border-bottom:2px solid #1a4d24;padding-bottom:4px;">${sec.section}</h3><table style="width:100%;border-collapse:collapse;font-size:13px;">${rows}</table>`;
      }else{
        const hdr=sec.cols.map(c=>`<th style="padding:5px 8px;background:#f3f4f6;border:1px solid #e5e7eb;">${c}</th>`).join('');
        const bdy=sec.rows.map(r=>`<tr>${r.map(c=>`<td style="padding:5px 8px;border:1px solid #e5e7eb;">${c}</td>`).join('')}</tr>`).join('');
        return `<h3 style="margin:16px 0 6px;color:#1a4d24;border-bottom:2px solid #1a4d24;padding-bottom:4px;">${sec.section}</h3><table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr>${hdr}</tr></thead><tbody>${bdy}</tbody></table>`;
      }
    }).join('');
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${resp.name} - ${form?.title||'ใบสมัครงาน'}</title>
<style>body{font-family:'Prompt','Sarabun',sans-serif;margin:24px;color:#1f2937;}@media print{body{margin:12px;}}</style>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
</head><body>
${headerHtml}
<div style="display:flex;gap:16px;margin-bottom:12px;padding:10px;background:#f9fafb;border-radius:8px;font-size:13px;">
  <span><b>ผู้สมัคร:</b> ${resp.name}</span>
  <span><b>ส่งเมื่อ:</b> ${resp.submittedAt||resp.at}</span>
  ${resp.approvedAt?`<span><b>อนุมัติเมื่อ:</b> ${resp.approvedAt}</span>`:''}
</div>
${sectionsHtml}
<script>window.onload=()=>window.print();<\/script>
</body></html>`;
    const w=window.open('','_blank','width=900,height=700');
    if(w){w.document.write(html);w.document.close();}
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:8000,overflowY:'auto',padding:'24px 16px'}} onClick={onClose}>
      <div className="mc" style={{width:'100%',maxWidth:780,padding:0,overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:'18px 24px',background:'linear-gradient(135deg,#1a4d24,#2d7a3a)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:28}}>{resp.avatar}</span>
            <div>
              <div style={{fontSize:16,fontWeight:700,color:'white'}}>{resp.name}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.75)'}}>{resp.position} · {resp.submittedAt||resp.at}</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={printPDF} className="nb" style={{padding:'7px 14px',fontSize:12,display:'flex',alignItems:'center',gap:5}}>
              <I n="print" s={16}/>พิมพ์ PDF
            </button>
            <button onClick={onClose} className="nb" style={{padding:'7px'}}><I n="close" s={18}/></button>
          </div>
        </div>
        {/* Meta bar */}
        <div style={{padding:'12px 24px',background:'#f9fafb',borderBottom:'1px solid #e5e7eb',display:'flex',gap:20,fontSize:12,color:'#6b7280'}}>
          <span><b style={{color:'#374151'}}>สถานะ:</b> <span style={{color:st.c,fontWeight:600}}>{st.l}</span></span>
          <span><b style={{color:'#374151'}}>เงินเดือน:</b> {resp.salary} บาท</span>
          <span><b style={{color:'#374151'}}>โทร:</b> {resp.tel}</span>
          {resp.approvedAt&&<span><b style={{color:'#374151'}}>อนุมัติ:</b> {resp.approvedAt}</span>}
        </div>
        {/* Body */}
        <div style={{padding:'20px 24px',maxHeight:'60vh',overflowY:'auto'}}>
          {fields.map((sec,si)=>(
            <div key={si} style={{marginBottom:20}}>
              <h3 style={{fontSize:13,fontWeight:700,color:'#1a4d24',borderBottom:'2px solid rgba(26,77,36,.15)',paddingBottom:6,marginBottom:10}}>{sec.section}</h3>
              {sec.type==='fields'?(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 16px'}}>
                  {sec.items.map(([k,v],ii)=>(
                    <div key={ii} style={{gridColumn:v.length>40?'span 2':'span 1',padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>
                      <div style={{fontSize:10,color:'#9ca3af',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>{k}</div>
                      <div style={{fontSize:13,color:'#1f2937',marginTop:2}}>{v}</div>
                    </div>
                  ))}
                </div>
              ):(
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead>
                      <tr>{sec.cols.map((c,ci)=>(
                        <th key={ci} style={{padding:'6px 10px',background:'#f3f4f6',border:'1px solid #e5e7eb',fontWeight:600,textAlign:'left'}}>{c}</th>
                      ))}</tr>
                    </thead>
                    <tbody>
                      {sec.rows.map((row,ri)=>(
                        <tr key={ri}>{row.map((cell,ci)=>(
                          <td key={ci} style={{padding:'5px 10px',border:'1px solid #e5e7eb'}}>{cell}</td>
                        ))}</tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── BlockRender ── */
function BlockRender({block,preview=false}){
  const [tableData,setTableData]=useState(()=>{
    if(block.type==='table'){
      return (block.rows||[]).map(r=>Array.isArray(r)?r:(block.columns||[]).map(()=>r||''));
    }
    return [];
  });
  const [matrixSel,setMatrixSel]=useState({});
  const [checkSel,setCheckSel]=useState({});
  const labelStyle={fontSize:12,fontWeight:600,color:'#4b5563',marginBottom:5,display:'block'};
  const reqStar=block.required?<span style={{color:'#ef4444',marginLeft:2}}>*</span>:null;
  if(block.type==='section')return(
    <div style={{borderLeft:'4px solid #2d7a3a',paddingLeft:12,margin:'4px 0 2px'}}>
      <span style={{fontSize:14,fontWeight:700,color:'#1a4d24'}}>{block.label}</span>
    </div>
  );
  if(block.type==='text'||block.type==='number'||block.type==='date')return(
    <div>
      <label style={labelStyle}>{block.label}{reqStar}</label>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <input disabled={!preview} type={block.type==='date'?'date':block.inputType||block.type}
          className="ni" placeholder={block.placeholder||''}
          style={{flex:1}}/>
        {block.unit&&<span style={{fontSize:11,color:'#9ca3af',flexShrink:0}}>{block.unit}</span>}
      </div>
    </div>
  );
  if(block.type==='textarea')return(
    <div>
      <label style={labelStyle}>{block.label}{reqStar}</label>
      <textarea disabled={!preview} className="ni" placeholder={block.placeholder||''}
        rows={block.rows||4} maxLength={block.maxLength} style={{resize:'vertical'}}/>
      {block.maxLength&&<div style={{textAlign:'right',fontSize:10,color:'#9ca3af',marginTop:2}}>max {block.maxLength} ตัวอักษร</div>}
    </div>
  );
  if(block.type==='radio')return(
    <div>
      <label style={labelStyle}>{block.label}{reqStar}</label>
      <div style={{display:'flex',flexDirection:block.layout==='horizontal'?'row':'column',gap:8,flexWrap:'wrap'}}>
        {(block.options||[]).map((o,i)=>(
          <label key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
            <input type="radio" name={block.id} disabled={!preview} style={{accentColor:'#2d7a3a'}}/>{o}
          </label>
        ))}
      </div>
    </div>
  );
  if(block.type==='checkbox')return(
    <div>
      <label style={labelStyle}>{block.label}{reqStar}</label>
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        {(block.options||[]).map((o,i)=>(
          <label key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
            <input type="checkbox" disabled={!preview} style={{accentColor:'#2d7a3a'}}
              checked={!!checkSel[i]} onChange={()=>preview&&setCheckSel(s=>({...s,[i]:!s[i]}))}/>{o}
          </label>
        ))}
      </div>
    </div>
  );
  if(block.type==='table')return(
    <div>
      <label style={labelStyle}>{block.label}{reqStar}</label>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr>{(block.columns||[]).map((c,i)=>(
              <th key={i} style={{padding:'7px 8px',background:'rgba(45,122,58,.08)',border:'1px solid rgba(45,122,58,.2)',fontWeight:600,fontSize:11,textAlign:'center'}}>{c}</th>
            ))}</tr>
          </thead>
          <tbody>
            {tableData.map((row,ri)=>(
              <tr key={ri}>
                {row.map((cell,ci)=>(
                  <td key={ci} style={{border:'1px solid #e5e7eb',padding:2}}>
                    <input className="tbl-in" value={cell} readOnly={!preview}
                      onChange={e=>{if(!preview)return;const d=[...tableData];d[ri]=[...d[ri]];d[ri][ci]=e.target.value;setTableData(d);}}/>
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
        {block.canAddRows&&preview&&(
          <button onClick={()=>setTableData(d=>[...d,(block.columns||[]).map(()=>'')])} className="nb"
            style={{width:'100%',padding:'5px',fontSize:11,marginTop:4,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
            <I n="add" s={13}/>เพิ่มแถว
          </button>
        )}
      </div>
    </div>
  );
  if(block.type==='matrix')return(
    <div>
      <label style={labelStyle}>{block.label}{reqStar}</label>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
          <thead>
            <tr>
              <th style={{padding:'5px 8px',border:'1px solid rgba(45,122,58,.2)',background:'rgba(45,122,58,.08)'}}></th>
              {(block.groups||[]).map((g,gi)=>(
                <th key={gi} colSpan={g.levels.length} style={{padding:'5px 8px',border:'1px solid rgba(45,122,58,.2)',background:'rgba(45,122,58,.08)',textAlign:'center'}}>{g.label}</th>
              ))}
            </tr>
            <tr>
              <th style={{padding:'4px 8px',border:'1px solid rgba(45,122,58,.2)',background:'rgba(45,122,58,.04)'}}></th>
              {(block.groups||[]).flatMap((g,gi)=>g.levels.map((lv,li)=>(
                <th key={gi+'-'+li} style={{padding:'4px 6px',border:'1px solid rgba(45,122,58,.2)',background:'rgba(45,122,58,.04)',fontWeight:500}}>{lv}</th>
              )))}
            </tr>
          </thead>
          <tbody>
            {(block.rows||[]).map((row,ri)=>(
              <tr key={ri}>
                <td style={{padding:'5px 8px',border:'1px solid #e5e7eb',fontWeight:500}}>{row}</td>
                {(block.groups||[]).flatMap((g,gi)=>g.levels.map((lv,li)=>{
                  const key=row+'-'+gi;
                  const sel=matrixSel[key];
                  return(
                    <td key={gi+'-'+li} style={{border:'1px solid #e5e7eb',textAlign:'center',padding:4}}>
                      <input type="radio" name={block.id+'-'+ri+'-'+gi} disabled={!preview}
                        checked={sel===li} onChange={()=>preview&&setMatrixSel(s=>({...s,[key]:li}))}
                        style={{accentColor:'#2d7a3a'}}/>
                    </td>
                  );
                }))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
  if(block.type==='pagebreak')return(
    <div style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'6px 0',userSelect:'none'}}>
      <div style={{flex:1,borderTop:'2px dashed #d1d5db'}}/>
      <span style={{fontSize:10,color:'#9ca3af',fontWeight:600,letterSpacing:'.08em',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}>
        <I n="content_cut" s={13} style={{color:'#9ca3af'}}/>แบ่งหน้า A4
      </span>
      <div style={{flex:1,borderTop:'2px dashed #d1d5db'}}/>
    </div>
  );
  if(block.type==='photo')return(
    <div>
      <label style={labelStyle}>{block.label}{reqStar}</label>
      <div className="neu-in" style={{padding:'18px',textAlign:'center',borderRadius:10}}>
        <I n="photo_camera" s={28} c="" style={{color:'#9ca3af'}}/>
        <div style={{fontSize:11,color:'#9ca3af',marginTop:6}}>{block.accept||'image/*'} · max {block.maxSizeMB||2}MB</div>
        {preview&&<button className="nb" style={{padding:'6px 16px',fontSize:12,marginTop:8}}>เลือกไฟล์</button>}
      </div>
    </div>
  );
  return null;
}

              <div style={{fontSize:11,color:'#9ca3af',marginTop:3}}>{s.label}</div>

              <button onClick={()=>setDashPage(p=>Math.min(totalDashPages-1,p+1))} disabled={safeDashPage===totalDashPages-1}
                className="nb" style={{padding:'5px 10px',fontSize:12,display:'flex',alignItems:'center',gap:3,opacity:safeDashPage===totalDashPages-1?.4:1}}>
                ถัดไป<I n="chevron_right" s={15}/>
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

          <SL c="ตำแหน่งที่สมัคร *"/>
          <NI value={position} onChange={setPosition} placeholder="เช่น Software Developer"/>
        </div>
        <div style={{display:'flex',gap:10,marginBottom:20}}>
          <div style={{flex:1}}>
            <SL c="เงินเดือนที่ต้องการ"/>
            <NI value={salary} onChange={setSalary} placeholder="45,000"/>

          <div style={{flex:1}}>

          <button onClick={submit} className="nbg" style={{padding:'9px 24px',fontSize:13,opacity:(!name||!position)?0.5:1}}
            disabled={!name||!position}>

          </button>
        </div>
      </div>
    </div>
  );
}

/* ── FormsListView ── */

                <span style={{fontSize:10,color:'#9ca3af',display:'flex',alignItems:'center',gap:2}}><I n="edit" s={11}/>แก้ไขเมื่อ {f.updatedAt}</span>

/* ── BuilderView ── */
function BuilderView({form,onSave,setView,onPreview}){
  const [blocks,setBlocks]=useState(form?.blocks||JSON.parse(JSON.stringify(DEF_BLOCKS)));
  const [selectedId,setSelectedId]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [logo,setLogo]=useState(form?.logo||{dataUrl:'',position:'left',inline:true});
  const [desc,setDesc]=useState(form?.desc||'');
  const dragRef=useRef(null);
  const selected=blocks.find(b=>b.id===selectedId);

  const addBlock=type=>{
    const bt=BT.find(b=>b.type===type);
    const base={id:'b'+Date.now(),type,colSpan:'full',label:bt?.label||type};
    if(type==='radio'||type==='checkbox')base.options=['ตัวเลือก 1','ตัวเลือก 2'];
    if(type==='radio')base.layout='vertical';
    if(type==='table')Object.assign(base,{columns:['คอลัมน์ 1','คอลัมน์ 2'],rows:['',''],canAddRows:true});
    if(type==='matrix')Object.assign(base,{rows:['แถว 1'],groups:[{label:'กลุ่ม 1',levels:['ดี','ปานกลาง','พอใช้']}]});
    if(type==='photo')Object.assign(base,{accept:'image/*',maxSizeMB:2});
    if(type==='pagebreak'){base.colSpan='full';}
    if(type==='textarea')Object.assign(base,{rows:4,maxLength:500});
    setBlocks(prev=>[...prev,base]);
    setSelectedId(base.id);
  };

  const updBlock=(id,nb)=>setBlocks(prev=>prev.map(b=>b.id===id?nb:b));
  const delBlock=id=>{setBlocks(prev=>prev.filter(b=>b.id!==id));setSelectedId(null);};
  const moveUp=id=>{const i=blocks.findIndex(b=>b.id===id);if(i>0){const a=[...blocks];[a[i-1],a[i]]=[a[i],a[i-1]];setBlocks(a);}};
  const moveDown=id=>{const i=blocks.findIndex(b=>b.id===id);if(i<blocks.length-1){const a=[...blocks];[a[i],a[i+1]]=[a[i+1],a[i]];setBlocks(a);}};

  const save=()=>{
    onSave({...form,blocks,logo,desc,updatedAt:new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'})});
    alert('บันทึกฟอร์มแล้ว!');
  };

  const spanClass=s=>s==='half'?'bhalf':s==='third'?'bthird':'bfull';

  /* header with logo */
  const logoPos=logo?.position||'left';
  const titleAlign=logo?.titleAlign||'left';
  const justifyLogo=logoPos==='center'?'center':logoPos==='right'?'flex-end':'flex-start';
  const renderHeader=()=>(
    <div style={{marginBottom:16,padding:'14px 18px',background:'white',borderRadius:10,boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
      {logo?.dataUrl&&logo?.inline?(
        <div style={{display:'flex',alignItems:'center',gap:14,justifyContent:justifyLogo,marginBottom:6}}>
          <img src={logo.dataUrl} alt="logo" style={{height:46,objectFit:'contain',flexShrink:0}}/>
          <div style={{textAlign:titleAlign}}>
            <div style={{fontSize:17,fontWeight:700,color:'#1a4d24'}}>{form?.title}</div>
            {desc&&<div style={{fontSize:12,color:'#6b7280',marginTop:2}}>{desc}</div>}
          </div>
        </div>
      ):(
        <>
          {logo?.dataUrl&&<div style={{display:'flex',justifyContent:justifyLogo,marginBottom:6}}><img src={logo.dataUrl} alt="logo" style={{height:46,objectFit:'contain'}}/></div>}
          <div style={{textAlign:titleAlign}}>
            <div style={{fontSize:17,fontWeight:700,color:'#1a4d24'}}>{form?.title}</div>
            {desc&&<div style={{fontSize:12,color:'#6b7280',marginTop:2}}>{desc}</div>}
          </div>
        </>
      )}
    </div>
  );

  return(
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>
      {/* Left palette */}
      <div className="no-print" style={{width:200,padding:'16px 10px',overflowY:'auto',borderRight:'1px solid #e5e7eb',background:'#fafafa',flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,paddingLeft:4}}>เพิ่มบล็อก</div>
        {BT.map(bt=>(
          <button key={bt.type} onClick={()=>addBlock(bt.type)} className="nb"
            style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 10px',marginBottom:5,textAlign:'left'}}>
            <I n={bt.icon} s={16}/>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'#374151'}}>{bt.label}</div>
              <div style={{fontSize:9,color:'#9ca3af'}}>{bt.desc}</div>
            </div>
          </button>
        ))}
      </div>
      {/* Canvas */}
      <div style={{flex:1,padding:'20px',overflowY:'auto'}} onClick={()=>setSelectedId(null)}>
        <div style={{maxWidth:740,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <h2 style={{fontSize:16,fontWeight:700,color:'#1a4d24'}}>{form?.title}</h2>
              <span style={{fontSize:11,color:'#9ca3af'}}>{blocks.length} บล็อก</span>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>onPreview&&onPreview()} className="nb" style={{padding:'8px 14px',fontSize:12,display:'flex',alignItems:'center',gap:5}}>
                <I n="visibility" s={16}/>Preview
              </button>
              <button onClick={save} className="nbg" style={{padding:'8px 18px',fontSize:12,display:'flex',alignItems:'center',gap:5}}>
                <I n="save" s={16}/>บันทึก
              </button>
            </div>
          </div>
          {renderHeader()}
          <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
            {blocks.map((b,idx)=>{
              const isSel=b.id===selectedId;
              const bAlign=b.blockAlign||'start';
              const bStyle={cursor:'pointer',outline:isSel?'2px solid #2d7a3a':dragOver===idx?'2px dashed #48b356':'2px solid transparent',
                borderRadius:12,background:'white',padding:'12px 14px',boxShadow:'0 1px 4px rgba(0,0,0,.05)',transition:'outline .1s',position:'relative',
                marginLeft:bAlign==='center'||bAlign==='end'?'auto':0,
                marginRight:bAlign==='center'?'auto':0};
              return(
                <React.Fragment key={b.id}>
                  {b.breakRow&&<div style={{flexBasis:'100%',height:0}}/>}
                  <div className={spanClass(b.colSpan)}
                    draggable
                    onDragStart={()=>dragRef.current=idx}
                    onDragOver={e=>{e.preventDefault();setDragOver(idx);}}
                    onDrop={()=>{
                      if(dragRef.current===null||dragRef.current===idx)return;
                      const a=[...blocks];
                      const[removed]=a.splice(dragRef.current,1);
                      a.splice(idx,0,removed);
                      setBlocks(a);dragRef.current=null;setDragOver(null);
                    }}
                    onDragEnd={()=>setDragOver(null)}
                    onClick={e=>{e.stopPropagation();setSelectedId(b.id);}}
                    style={bStyle}>
                    {isSel&&(
                      <div style={{position:'absolute',top:6,right:6,display:'flex',gap:3}}>
                        <button onClick={e=>{e.stopPropagation();moveUp(b.id);}} className="nb" style={{padding:'2px 4px'}}><I n="arrow_upward" s={12}/></button>
                        <button onClick={e=>{e.stopPropagation();moveDown(b.id);}} className="nb" style={{padding:'2px 4px'}}><I n="arrow_downward" s={12}/></button>
                      </div>
                    )}
                    <BlockRender block={b} preview={false}/>
                  </div>
                </React.Fragment>
              );
            })}
          </div>
        </div>
      </div>
      {/* Right settings panel */}
      <div className="no-print" style={{width:240,padding:'16px 12px',overflowY:'auto',borderLeft:'1px solid #e5e7eb',background:'#fafafa',flexShrink:0}}>
        {selected?(
          <BlockSettings block={selected} onChange={nb=>updBlock(selected.id,nb)} onDelete={()=>delBlock(selected.id)}/>
        ):(
          <FormSettings logo={logo} desc={desc} onLogoChange={setLogo} onDescChange={setDesc}/>
        )}
      </div>
    </div>
  );
}

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Sarabun',sans-serif;background:white;padding:24px 32px;}h1{font-size:18px;font-weight:700;color:#1a4d24;}label{font-size:12px;font-weight:600;color:#4b5563;display:block;margin-bottom:4px;}input,textarea,select{font-family:'Sarabun',sans-serif;width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;background:white;}table{width:100%;border-collapse:collapse;font-size:12px;}th{background:#f3f4f6;border:1px solid #d1d5db;padding:6px 8px;font-weight:600;}td{border:1px solid #d1d5db;padding:5px 8px;}.block{margin-bottom:14px;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;}.section{border-left:4px solid #2d7a3a;padding:4px 0 4px 10px;margin:8px 0;border:none;}.row{display:flex;flex-wrap:wrap;gap:12px;}.full{flex:0 0 100%;}.half{flex:0 0 calc(50% - 6px);}.third{flex:0 0 calc(33.333% - 8px);}@media print{@page{size:A4;margin:15mm;}body{padding:0;}.no-print{display:none;}}</style></head><body>
<div style="margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid rgba(45,122,58,.2);">${form?.logo?.dataUrl&&form?.logo?.inline?`<div style="display:flex;align-items:center;gap:14px;justify-content:${justifyLogo};"><img src="${form.logo.dataUrl}" style="height:50px;object-fit:contain;"/><div style="text-align:${titleAlign};"><h1>${form?.title||''}</h1><p style="font-size:12px;color:#6b7280;margin-top:3px;">${form?.desc||''}</p></div></div>`:form?.logo?.dataUrl?`<div style="display:flex;justify-content:${justifyLogo};margin-bottom:8px;"><img src="${form.logo.dataUrl}" style="height:50px;object-fit:contain;"/></div><div style="text-align:${titleAlign};"><h1>${form?.title||''}</h1><p style="font-size:12px;color:#6b7280;margin-top:3px;">${form?.desc||''}</p></div>`:`<div style="text-align:${titleAlign};"><h1>${form?.title||''}</h1><p style="font-size:12px;color:#6b7280;margin-top:3px;">${form?.desc||''}</p></div>`}</div>
<div class="row">${(form?.blocks||[]).map(b=>{
  if(b.type==='pagebreak') return `<div style="flex:0 0 100%;border-top:2px dashed #d1d5db;margin:8px 0;page-break-after:always;"></div>`;
  const cls=b.colSpan==='half'?'half':b.colSpan==='third'?'third':'full';
  const brk=b.breakRow?'<div style="flex:0 0 100%;height:0;"></div>':'';
  const ml=b.blockAlign==='end'||b.blockAlign==='center'?'margin-left:auto;':'';
  const mr=b.blockAlign==='center'?'margin-right:auto;':'';
  if(b.type==='section') return `${brk}<div class="${cls} section" style="${ml}${mr}"><strong style="font-size:13px;color:#1a4d24;">${b.label||''}</strong></div>`;
  if(b.type==='table') return `${brk}<div class="${cls} block" style="${ml}${mr}"><label>${b.label||''}</label><table><thead><tr>${(b.columns||[]).map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${(b.rows||[]).map(r=>`<tr>${(b.columns||[]).map(()=>'<td>&nbsp;</td>').join('')}</tr>`).join('')}</tbody></table></div>`;
  if(b.type==='matrix') return `${brk}<div class="${cls} block" style="${ml}${mr}"><label>${b.label||''}</label><table><thead><tr><th></th>${(b.groups||[]).map(g=>`<th colspan="${g.levels.length}">${g.label}</th>`).join('')}</tr><tr><th></th>${(b.groups||[]).flatMap(g=>g.levels.map(lv=>`<th>${lv}</th>`)).join('')}</tr></thead><tbody>${(b.rows||[]).map(r=>`<tr><td>${r}</td>${(b.groups||[]).flatMap(g=>g.levels.map(()=>`<td style="text-align:center;"><input type="radio" style="width:auto;border:none;padding:0;"/></td>`)).join('')}</tr>`).join('')}</tbody></table></div>`;
  if(b.type==='photo') return `${brk}<div class="${cls} block" style="${ml}${mr}"><label>${b.label||''}</label><div style="border:1px dashed #d1d5db;border-radius:6px;padding:18px;text-align:center;color:#9ca3af;font-size:12px;">เลือกไฟล์ / อัปโหลด</div></div>`;
  if(b.type==='textarea') return `${brk}<div class="${cls} block" style="${ml}${mr}"><label>${b.label||''}</label><textarea rows="${b.rows||4}" placeholder="${b.placeholder||''}"></textarea></div>`;
  if(b.type==='radio') return `${brk}<div class="${cls} block" style="${ml}${mr}"><label>${b.label||''}</label><div style="display:flex;flex-direction:${b.layout==='horizontal'?'row':'column'};gap:8px;flex-wrap:wrap;">${(b.options||[]).map(o=>`<label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="radio" style="width:auto;border:none;padding:0;"/> ${o}</label>`).join('')}</div></div>`;
  if(b.type==='checkbox') return `${brk}<div class="${cls} block" style="${ml}${mr}"><label>${b.label||''}</label><div style="display:flex;flex-direction:column;gap:6px;">${(b.options||[]).map(o=>`<label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="checkbox" style="width:auto;border:none;padding:0;"/> ${o}</label>`).join('')}</div></div>`;
  return `${brk}<div class="${cls} block" style="${ml}${mr}"><label>${b.label||''}</label><input type="${b.inputType||b.type}" placeholder="${b.placeholder||''}"/>${b.unit?`<span style="font-size:11px;color:#9ca3af;"> ${b.unit}</span>`:''}</div>`;
}).join('')}</div>
<script>window.onload=()=>window.print();<\/script></body></html>`);w.document.close();}} className="nb" style={{padding:'7px 14px',fontSize:12,display:'flex',alignItems:'center',gap:5}}>
              <I n="print" s={16}/>พิมพ์ฟอร์ม PDF
            </button>
          </div>
        </div>
        <div className="neu" style={{padding:'28px 32px'}}>
          {/* Form header */}
          <div style={{marginBottom:22,paddingBottom:16,borderBottom:'2px solid rgba(45,122,58,.12)'}}>
            {logo?.dataUrl&&logo?.inline?(
              <div style={{display:'flex',alignItems:'center',gap:14,justifyContent:justifyLogo,marginBottom:4}}>
                <img src={logo.dataUrl} alt="logo" style={{height:52,objectFit:'contain',flexShrink:0}}/>
                <div style={{textAlign:titleAlign}}>
                  <div style={{fontSize:20,fontWeight:700,color:'#1a4d24'}}>{form?.title}</div>
                  {desc&&<div style={{fontSize:13,color:'#6b7280',marginTop:2}}>{desc}</div>}
                </div>
              </div>
            ):(
              <>
                {logo?.dataUrl&&<div style={{display:'flex',justifyContent:justifyLogo,marginBottom:8}}><img src={logo.dataUrl} alt="logo" style={{height:52,objectFit:'contain'}}/></div>}
                <div style={{textAlign:titleAlign}}>
                  <div style={{fontSize:20,fontWeight:700,color:'#1a4d24'}}>{form?.title}</div>
                  {desc&&<div style={{fontSize:13,color:'#6b7280',marginTop:4}}>{desc}</div>}
                </div>
              </>
            )}
          </div>
          {/* Blocks */}
          <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
            {blocks.map(b=>{
              const bAlign=b.blockAlign||'start';
              const isSection=b.type==='section';
              const isPageBreak=b.type==='pagebreak';
              return(
                <React.Fragment key={b.id}>
                  {b.breakRow&&<div style={{flexBasis:'100%',height:0}}/>}
                  <div className={spanClass(b.colSpan)} style={{
                    padding:isSection||isPageBreak?'4px 0':'10px 14px',
                    background:isSection||isPageBreak?'transparent':'white',
                    borderRadius:isSection||isPageBreak?0:10,
                    boxShadow:isSection||isPageBreak?'none':'0 1px 4px rgba(0,0,0,.05)',
                    marginLeft:bAlign==='center'||bAlign==='end'?'auto':0,
                    marginRight:bAlign==='center'?'auto':0}}>
                    <BlockRender block={b} preview={true}/>
                  </div>
                </React.Fragment>
              );
            })}
          </div>
          {/* Submit */}
          <div style={{marginTop:28,display:'flex',justifyContent:'center'}}>
            <button className="nbg" style={{padding:'12px 40px',fontSize:15}} onClick={()=>setShowSubmit(true)}>
              <I n="send" s={18}/> ส่งใบสมัคร
            </button>
          </div>
        </div>
      </div>
      {showSubmit&&<SubmitFormModal form={form} onClose={()=>setShowSubmit(false)} onSubmit={d=>{onSubmit&&onSubmit(d);setShowSubmit(false);}}/>}
    </div>
  );
}

/* ── ResponsesView ── */
const RESP_PER_PAGE=50;
function ResponsesView({forms,responses,setResponses,onViewResp}){
  const [search,setSearch]=useState('');
  const [filterStatus,setFilterStatus]=useState('all');
  const [formFilter,setFormFilter]=useState('all');
  const [page,setPage]=useState(0);
  const statusMap={new:{l:'ใหม่',c:'#2563eb',bg:'rgba(37,99,235,.1)'},reviewed:{l:'ตรวจสอบแล้ว',c:'#d97706',bg:'rgba(217,119,6,.1)'},shortlisted:{l:'คัดเลือก',c:'#2d7a3a',bg:'rgba(45,122,58,.1)'},rejected:{l:'ไม่ผ่าน',c:'#dc2626',bg:'rgba(220,38,38,.1)'}};
  const base=responses.filter(r=>formFilter==='all'||r.formId===formFilter);
  const myResps=base.filter(r=>r.name.includes(search)||r.position.includes(search));
  const filtered=myResps.filter(r=>filterStatus==='all'||(filterStatus==='starred'?r.starred:r.status===filterStatus));
  const totalPages=Math.max(1,Math.ceil(filtered.length/RESP_PER_PAGE));
  const safePage=Math.min(page,totalPages-1);
  const pageItems=filtered.slice(safePage*RESP_PER_PAGE,(safePage+1)*RESP_PER_PAGE);
  const total=myResps.length;
  const nw=myResps.filter(r=>r.status==='new').length;
  const rev=myResps.filter(r=>r.status==='reviewed'||r.status==='shortlisted').length;
  const remaining=total-rev;
  useEffect(()=>setPage(0),[search,filterStatus,formFilter]);

  const [deleteConfirmId,setDeleteConfirmId]=useState(null);
  const [statusConfirm,setStatusConfirm]=useState(null); // {id, next}
  const changeStatus=(id,ns)=>{
    setResponses(prev=>prev.map(r=>{
      if(r.id!==id)return r;
      return {...r,status:ns,approvedAt:ns==='shortlisted'?new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'})+', '+new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):r.approvedAt};
    }));
    setStatusConfirm(null);
  };
  const toggleStar=(id)=>setResponses(prev=>prev.map(r=>r.id===id?{...r,starred:!r.starred}:r));
  const deleteResp=(id)=>{setResponses(prev=>prev.filter(r=>r.id!==id));setDeleteConfirmId(null);};

  const exportCSV=()=>{
    const esc=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
    const row=a=>a.map(esc).join(',')+'\n';
    let csv='\uFEFF';
    csv+='[ฟอร์มทั้งหมด / Forms]\n';
    csv+=row(['Form ID','ชื่อฟอร์ม','คำอธิบาย','สถานะ','จำนวน Blocks','จำนวนตอบกลับ','วันที่สร้าง','วันที่อัปเดต']);
    (forms||[]).forEach(f=>{ csv+=row([f.id,f.title,f.desc||'',f.active!==false?'เปิดใช้งาน':'ปิดใช้งาน',f.blocks.length,responses.filter(r=>r.formId===f.id).length,f.createdAt,f.updatedAt]); });
    csv+='\n[เอกสารตอบกลับ / Responses]\n';
    csv+=row(['Response ID','Form ID','ชื่อฟอร์ม','ชื่อผู้สมัคร','ตำแหน่งที่สมัคร','เงินเดือน (บาท)','เบอร์โทรศัพท์','สถานะ','ติดดาว','Timestamp ที่ส่ง (Submitted At)','Timestamp ที่ Approved']);
    responses.forEach(r=>{ const f=(forms||[]).find(f=>f.id===r.formId); csv+=row([r.id,r.formId,f?.title||'',r.name,r.position,r.salary||'',r.tel||'',r.status,r.starred?'Yes':'No',r.submittedAt||r.at,r.approvedAt||'']); });
    csv+=`\n[Generated],"${new Date().toLocaleString('th-TH')}"\n`;
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='hr_formkit_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},300);
  };

  return(
    <div style={{padding:28,overflowY:'auto',flex:1}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:'#1a2e1a'}}>เอกสารตอบกลับ <span style={{fontSize:13,fontWeight:400,color:'#9ca3af'}}>(Responding Documents)</span></h1>
          <p style={{fontSize:13,color:'#9ca3af',marginTop:3}}>{formFilter==='all'?'ทุกฟอร์ม':(forms||[]).find(f=>f.id===formFilter)?.title||''} — {total} รายการ</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={exportCSV} className="nb" style={{padding:'8px 14px',fontSize:12,display:'flex',alignItems:'center',gap:6,color:'#374151'}}><I n="download" s={16}/>Export Excel (.csv)</button>
        </div>
      </div>
      {/* Flat stat bar */}
      <div className="neu" style={{marginBottom:20,overflow:'hidden'}}>
        <div style={{padding:'12px 20px',borderBottom:'1px solid #f0f0f0',display:'flex',alignItems:'center',gap:6}}>
          <I n="bar_chart" s={18} c="text-green-700"/><span style={{fontWeight:600,fontSize:13,color:'#374151'}}>สรุปเอกสารตอบกลับ</span>
        </div>
        <div className="stat-bar">
          {[
            {label:'ทั้งหมด',  value:total,    icon:'inbox',          color:'#374151'},
            {label:'ใหม่',     value:nw,       icon:'fiber_new',      color:'#2563eb'},
            {label:'ตรวจสอบแล้ว',value:rev,   icon:'task_alt',       color:'#2d7a3a'},
            {label:'คงเหลือ', value:remaining, icon:'pending_actions', color:'#d97706'},
          ].map((s,i)=>(
            <div key={i} className="stat-col">
              <I n={s.icon} s={20} c="" style={{color:s.color}}/>
              <div style={{fontSize:24,fontWeight:700,color:s.color,marginTop:4,lineHeight:1}}>{s.value}</div>
              <div style={{fontSize:11,color:'#9ca3af',marginTop:3}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Filters */}
      <div className="neu-sm" style={{padding:'12px 16px',marginBottom:14,display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <div className="neu-in-sm" style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',flex:1,minWidth:160}}>
          <I n="search" s={16} c="" style={{color:'#9ca3af'}}/>
          <input style={{border:'none',background:'transparent',outline:'none',flex:1,fontSize:12,fontFamily:"'Sarabun',sans-serif"}}
            placeholder="ค้นหา..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div className="neu-in-sm" style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px'}}>
          <I n="folder_open" s={15} c="" style={{color:'#9ca3af'}}/>
          <select value={formFilter} onChange={e=>setFormFilter(e.target.value)}
            style={{border:'none',background:'transparent',outline:'none',fontSize:12,fontFamily:"'Prompt',sans-serif",color:'#374151',cursor:'pointer',maxWidth:160}}>
            <option value="all">ทุกฟอร์ม</option>
            {(forms||[]).map(f=><option key={f.id} value={f.id}>{f.title}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {['all',...Object.keys(statusMap),'starred'].map(s=>(
            <Chip key={s}
              label={s==='all'?'ทั้งหมด':s==='starred'?'ติดดาว':statusMap[s].l}
              active={filterStatus===s}
              onClick={()=>setFilterStatus(s)}/>
          ))}
        </div>
      </div>
      {/* Table */}
      <div className="neu-sm" style={{overflow:'hidden'}}>
        <div style={{padding:'10px 20px',borderBottom:'1px solid #f0f0f0',display:'grid',gridTemplateColumns:'220px 1fr 128px 80px 130px',gap:10,fontSize:10,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.06em',alignItems:'center'}}>
          <span>ผู้ทำแบบฟอร์ม</span><span>ตำแหน่ง</span><span>สถานะ</span><span>เวลา</span><span>จัดการ</span>
        </div>
        {pageItems.length===0&&<div style={{padding:'28px',textAlign:'center',color:'#9ca3af',fontSize:13}}>ไม่พบข้อมูล</div>}
        {pageItems.map(r=>{
          const st=statusMap[r.status]||statusMap.new;
          return(
            <div key={r.id} className="resp-row" style={{gridTemplateColumns:'220px 1fr 128px 80px 130px',display:'grid',gap:10,alignItems:'center'}}
              onClick={()=>onViewResp(r)}>
              <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
                <span style={{fontSize:18,flexShrink:0}}>{r.avatar}</span>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'#1f2937',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div>
                  <div style={{fontSize:10,color:'#9ca3af'}}>{r.submittedAt||r.at}</div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',fontSize:12,color:'#4b5563',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.position}</div>
              <div style={{display:'flex',alignItems:'center'}}>
                <button onClick={e=>{e.stopPropagation();setStatusConfirm({id:r.id,next:r.status});}} className="bdg"
                  style={{background:st.bg,color:st.c,border:'none',cursor:'pointer',fontFamily:"'Prompt',sans-serif",whiteSpace:'nowrap'}}>
                  {st.l}
                </button>
              </div>
              <div style={{display:'flex',alignItems:'center',fontSize:11,color:'#9ca3af',whiteSpace:'nowrap'}}>{r.at}</div>
              <div style={{display:'flex',alignItems:'center',gap:3}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>onViewResp(r)} className="nb" style={{padding:'4px 7px',display:'flex',alignItems:'center',gap:2,fontSize:11,whiteSpace:'nowrap',flexShrink:0}}>
                  <I n="picture_as_pdf" s={13}/>PDF
                </button>
                <button onClick={()=>toggleStar(r.id)} className="nb" style={{padding:'4px 6px',flexShrink:0}}>
                  <I n="star" s={14} c="" style={{color:r.starred?'#f59e0b':'#d1d5db'}}/>
                </button>
                <button onClick={()=>setDeleteConfirmId(r.id)} className="nb" style={{padding:'4px 6px',flexShrink:0}}>
                  <I n="delete" s={14} c="" style={{color:'#ef4444'}}/>
                </button>
              </div>
            </div>
          );
        })}
        {/* Pagination */}
        {totalPages>1&&(
          <div style={{padding:'10px 20px',borderTop:'1px solid #f0f0f0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:12,color:'#9ca3af'}}>หน้า {safePage+1} / {totalPages} ({filtered.length} รายการ)</span>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={safePage===0} className="nb"
                style={{padding:'5px 12px',fontSize:12,opacity:safePage===0?.4:1,display:'flex',alignItems:'center',gap:4}}>
                <I n="chevron_left" s={16}/>ก่อนหน้า
              </button>
              <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={safePage===totalPages-1} className="nb"
                style={{padding:'5px 12px',fontSize:12,opacity:safePage===totalPages-1?.4:1,display:'flex',alignItems:'center',gap:4}}>
                ถัดไป<I n="chevron_right" s={16}/>
              </button>
            </div>
          </div>
        )}
      </div>
      {/* Delete confirmation modal */}
      {deleteConfirmId&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9800}}>
          <div className="mc-sm" style={{width:340,padding:24}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <I n="warning" s={22} c="" style={{color:'#dc2626'}}/>
              <span style={{fontSize:14,fontWeight:700,color:'#1f2937'}}>ยืนยันการลบเอกสาร</span>
            </div>
            <p style={{fontSize:13,color:'#6b7280',marginBottom:18,lineHeight:1.6}}>
              คุณต้องการลบเอกสารตอบกลับของ <b style={{color:'#1f2937'}}>"{responses.find(r=>r.id===deleteConfirmId)?.name}"</b> ใช่หรือไม่?<br/>
              การดำเนินการนี้ไม่สามารถย้อนกลับได้
            </p>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>setDeleteConfirmId(null)} className="nb" style={{padding:'7px 16px',fontSize:12}}>ยกเลิก</button>
              <button onClick={()=>deleteResp(deleteConfirmId)} className="nbd" style={{padding:'7px 16px',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
                <I n="delete" s={14}/>ลบเอกสาร
              </button>
            </div>
          </div>
        </div>
      )}
      {/* Status change confirmation modal */}
      {statusConfirm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9800}}>
          <div className="mc-sm" style={{width:360,padding:24}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <I n="swap_horiz" s={22} c="" style={{color:'#2d7a3a'}}/>
              <span style={{fontSize:14,fontWeight:700,color:'#1f2937'}}>เปลี่ยนสถานะ</span>
            </div>
            <p style={{fontSize:12,color:'#6b7280',marginBottom:12,lineHeight:1.6}}>
              เลือกสถานะใหม่สำหรับเอกสารของ <b style={{color:'#1f2937'}}>"{responses.find(r=>r.id===statusConfirm.id)?.name}"</b>
            </p>
            <div style={{marginBottom:18}}>
              <SL c="สถานะใหม่"/>
              <select className="ni" value={statusConfirm.next} onChange={e=>setStatusConfirm({...statusConfirm,next:e.target.value})}>
                {Object.entries(statusMap).map(([k,v])=>(
                  <option key={k} value={k}>{v.l}</option>
                ))}
              </select>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>setStatusConfirm(null)} className="nb" style={{padding:'7px 16px',fontSize:12}}>ยกเลิก</button>
              <button onClick={()=>changeStatus(statusConfirm.id,statusConfirm.next)} className="nbg" style={{padding:'7px 16px',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
                <I n="check" s={14}/>ยืนยัน
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const [view,setView]=useState('dashboard');
  const [prevView,setPrevView]=useState('forms_list');
  const [forms,setForms]=useState(INIT_FORMS);
  const [responses,setResponses]=useState(SAMPLE_RESP);
  const [activeFormId,setActiveFormId]=useState('f1');
  const [showNewForm,setShowNewForm]=useState(false);
  const [detailResp,setDetailResp]=useState(null);

  const goPreview=(fromView)=>{setPrevView(fromView);setView('preview');};

  const activeForm=forms.find(f=>f.id===activeFormId)||forms[0];

  const saveForm=updated=>{
    setForms(prev=>prev.map(f=>f.id===updated.id?updated:f));
  };

  const createForm=newForm=>{
    setForms(prev=>[...prev,newForm]);
    setActiveFormId(newForm.id);
    setView('builder');
  };

  const onNewForm=()=>setShowNewForm(true);

  const onViewResp=resp=>{
    const form=forms.find(f=>f.id===resp.formId)||activeForm;
    setDetailResp({resp,form});
  };

  const handleSubmit=data=>{
    setResponses(prev=>[data,...prev]);
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar
        view={view}
        setView={setView}
        forms={forms}
        activeFormId={activeFormId}
        setActiveFormId={setActiveFormId}
        onNewForm={onNewForm}
      />
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {view==='dashboard'&&(
          <DashboardView
            forms={forms}
            responses={responses}
            setView={setView}
            setActiveFormId={setActiveFormId}
            onViewResp={onViewResp}
            setResponses={setResponses}
          />
        )}
        {view==='forms_list'&&(
          <FormsListView
            forms={forms}
            setForms={setForms}
            setView={setView}
            setActiveFormId={setActiveFormId}
            responses={responses}
            onNewForm={onNewForm}
            goPreview={(id)=>{setActiveFormId(id);goPreview('forms_list');}}
          />
        )}
        {view==='builder'&&(
          <BuilderView
            key={activeFormId}
            form={activeForm}
            onSave={saveForm}
            setView={setView}
            onPreview={()=>goPreview('builder')}
          />
        )}
        {view==='edit_form'&&(
          <BuilderView
            key={activeFormId}
            form={activeForm}
            onSave={saveForm}
            setView={setView}
            onPreview={()=>goPreview('edit_form')}
          />
        )}
        {view==='preview'&&(
          <PreviewView
            form={activeForm}
            onBack={()=>setView(prevView)}
            onSubmit={handleSubmit}
          />
        )}
        {view==='responses'&&(
          <ResponsesView
            forms={forms}
            responses={responses}
            setResponses={setResponses}
            onViewResp={onViewResp}
          />
        )}
      </div>
      {showNewForm&&(
        <NewFormDialog
          onClose={()=>setShowNewForm(false)}
          onCreate={createForm}
        />
      )}
      {detailResp&&(
        <ResponseDetailModal
          resp={detailResp.resp}
          form={detailResp.form}
          onClose={()=>setDetailResp(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
